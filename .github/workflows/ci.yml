name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────
  # Backend: type-check → lint → test
  # ─────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile --filter backend

      - name: TypeScript type-check
        run: pnpm --filter backend exec tsc --noEmit

      - name: Lint
        run: pnpm --filter backend run lint

      - name: Unit tests
        run: pnpm --filter backend run test --no-coverage

  # ─────────────────────────────────────
  # Frontend: type-check → lint → build
  # ─────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --filter frontend

      - name: Lint
        run: pnpm --filter frontend run lint

      - name: Build (includes tsc -b)
        run: pnpm --filter frontend run build
        env:
          VITE_API_URL: http://localhost:7770
